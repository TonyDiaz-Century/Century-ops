<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Schedule — Century Roof & Solar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:#2d7a3a;--green-dark:#1e5527;--green-light:#e8f5eb;
  --gold:#f0b429;--red:#c0392b;
  --bg:#f4f5f0;--surface:#ffffff;--border:#e0e2d9;
  --text:#1a1c18;--text-muted:#6b7066;--radius:10px;
  --shadow:0 2px 8px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}

/* HEADER */
.header{background:var(--green-dark);padding:16px 20px 14px;position:sticky;top:0;z-index:10}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);letter-spacing:1px}
.header-sub{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.5px;text-transform:uppercase;margin-top:1px}

.wrap{padding:20px 16px;max-width:560px;margin:0 auto}

/* SELECT SCREEN */
.select-screen{}
.welcome-text{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--green-dark);letter-spacing:0.5px;margin-bottom:4px}
.welcome-sub{font-size:14px;color:var(--text-muted);margin-bottom:20px}
.crew-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.crew-btn{padding:16px 12px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;transition:all 0.15s;text-align:center;box-shadow:var(--shadow)}
.crew-btn:active{transform:scale(0.97)}
.crew-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-light)}
.crew-btn .cb-avatar{width:40px;height:40px;border-radius:50%;background:var(--green);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.crew-btn .cb-role{font-size:11px;color:var(--text-muted);margin-top:3px;font-weight:400}

/* SCHEDULE SCREEN */
.schedule-screen{display:none}
.schedule-screen.show{display:block}
.select-screen.hide{display:none}

/* GREETING CARD */
.greeting-card{background:var(--green-dark);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.greeting-name{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);letter-spacing:1px}
.greeting-sub{font-size:13px;color:rgba(255,255,255,0.6);margin-top:3px}
.greeting-date{font-size:12px;color:rgba(255,255,255,0.4);margin-top:6px;font-family:'DM Mono',monospace}
.switch-btn{margin-top:12px;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.switch-btn:hover{background:rgba(255,255,255,0.2);color:#fff}

/* DAY SECTION */
.day-section{margin-bottom:14px}
.day-label{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text-muted);letter-spacing:0.5px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.day-label.today-label{color:var(--green-dark)}
.today-badge{background:var(--green);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:0}

/* JOB CARD */
.job-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.job-card.today-card{border:2px solid var(--green);background:var(--green-light)}
.job-card-accent{position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:var(--radius) 0 0 var(--radius)}
.job-type-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;color:#fff;margin-bottom:10px}
.job-name{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.job-address{font-size:14px;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:flex-start;gap:6px}
.job-address-icon{flex-shrink:0;margin-top:1px}
.job-detail-row{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);margin-bottom:5px}
.job-detail-row:last-child{margin-bottom:0}
.job-notes{background:var(--bg);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text);line-height:1.5;margin-top:10px;border-left:3px solid var(--gold)}
.map-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:12px;padding:11px;border-radius:8px;border:1.5px solid var(--green);background:transparent;color:var(--green);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;text-decoration:none}
.map-btn:active{background:var(--green-light)}

/* OFF DAY */
.off-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px}
.off-icon{font-size:24px;flex-shrink:0}
.off-text{font-size:14px;color:var(--text-muted)}
.off-reason{font-size:12px;color:var(--text-muted);opacity:0.7;margin-top:2px}

/* UNASSIGNED */
.unassigned-card{background:#fff8f0;border-radius:var(--radius);border:1px solid #fde8cc;padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px}
.unassigned-text{font-size:14px;color:#92400e}

/* LOADING */
.loading-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* WEEK NAV */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.week-nav-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--green-dark);letter-spacing:0.5px}
.week-nav-btns{display:flex;gap:6px}
.week-nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all 0.15s}
.week-nav-btn:active{background:var(--green-light);border-color:var(--green);color:var(--green)}
.today-btn{padding:0 10px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;border-radius:8px;border:1px solid var(--green);background:var(--green-light);color:var(--green);cursor:pointer;height:32px}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Century Ops</div>
  <div class="header-sub">My Schedule — Century Roof &amp; Solar</div>
</div>

<div class="wrap">

  <!-- SELECT SCREEN -->
  <div class="select-screen" id="select-screen">
    <div class="welcome-text">Who are you?</div>
    <div class="welcome-sub">Select your name to see your schedule</div>
    <div class="crew-grid" id="crew-grid">
      <div class="loading-state"><div class="spinner"></div>Loading crew...</div>
    </div>
  </div>

  <!-- SCHEDULE SCREEN -->
  <div class="schedule-screen" id="schedule-screen">
    <div class="greeting-card">
      <div class="greeting-name" id="greeting-name">Good morning!</div>
      <div class="greeting-sub" id="greeting-sub">Here's your schedule</div>
      <div class="greeting-date" id="greeting-date"></div>
      <button class="switch-btn" onclick="switchUser()">&#8592; Switch Name</button>
    </div>

    <div class="week-nav">
      <div class="week-nav-title" id="week-nav-title">This Week</div>
      <div class="week-nav-btns">
        <button class="week-nav-btn" onclick="changeWeek(-1)">&#8249;</button>
        <button class="today-btn" onclick="goToday()">Today</button>
        <button class="week-nav-btn" onclick="changeWeek(1)">&#8250;</button>
      </div>
    </div>

    <div id="schedule-body">
      <div class="loading-state"><div class="spinner"></div>Loading your schedule...</div>
    </div>
  </div>

</div>

<script>
const BASE_ID='appn1m7nkB7AqfMsN';
const TOKEN='patdw99npBzStV62o.9de4eaaa1b0a38c79d37a0e6eca7e1e58e0b1e8d4a32c725f6731ffe65aedd0e';
const TABLES={employees:'tblTcmlnB1W6jihNM',jobs:'tblyIpCuDl7SoH8hy',assignments:'tblrRTRTlrXo1KHx5',timeoff:'tblyIStionsei3yng'};

const TYPE_COLORS={'Tear-off':'#c0392b','Solar':'#27ae60','Repair':'#f0b429','Electrical':'#e67e22','Installation':'#2980b9','Gutters':'#8e44ad','Stucco':'#7f8c8d','Inspection':'#16a085','Sales':'#2c3e50'};

let currentEmployee=null;
let weekOffset=0;
let allData={employees:[],jobs:[],assignments:[],timeoff:[]};

function localISO(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getWeekDates(offset){
  const now=new Date();
  const mon=new Date(now);
  mon.setDate(now.getDate()-now.getDay()+1+(offset*7));
  return Array.from({length:6},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

async function airtableGet(table){
  let records=[],offset=null;
  do{
    const url=`https://api.airtable.com/v0/${BASE_ID}/${table}?pageSize=100${offset?'&offset='+offset:''}`;
    const r=await fetch(url,{headers:{Authorization:'Bearer '+TOKEN}});
    const d=await r.json();
    records=records.concat(d.records||[]);
    offset=d.offset;
  }while(offset);
  return records;
}

async function loadAll(){
  try{
    const [employees,jobs,assignments,timeoff]=await Promise.all([
      airtableGet(TABLES.employees),
      airtableGet(TABLES.jobs),
      airtableGet(TABLES.assignments),
      airtableGet(TABLES.timeoff)
    ]);
    allData={employees,jobs,assignments,timeoff};
    renderCrewGrid();
  }catch(e){
    document.getElementById('crew-grid').innerHTML='<div style="color:#c0392b;font-size:13px;grid-column:span 2">Could not load data. Check your connection.</div>';
  }
}

function renderCrewGrid(){
  const active=allData.employees.filter(e=>e.fields['Active']).sort((a,b)=>(a.fields['Name']||'').localeCompare(b.fields['Name']||''));
  document.getElementById('crew-grid').innerHTML=active.map(e=>{
    const initials=e.fields['Name'].split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
    const crew=e.fields['Crew']||'';
    return `<button class="crew-btn" onclick="selectEmployee('${e.fields['Name']}')">
      <div class="cb-avatar">${initials}</div>
      ${e.fields['Name']}
      <div class="cb-role">${e.fields['Role']||crew}</div>
    </button>`;
  }).join('');
}

function selectEmployee(name){
  currentEmployee=name;
  weekOffset=0;
  document.getElementById('select-screen').classList.add('hide');
  document.getElementById('schedule-screen').classList.add('show');

  const now=new Date();
  const hour=now.getHours();
  const greeting=hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';
  const firstName=name.split(' ')[0];
  document.getElementById('greeting-name').textContent=greeting+', '+firstName+'!';
  document.getElementById('greeting-sub').textContent='Here\'s your schedule for the week';
  document.getElementById('greeting-date').textContent=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  renderSchedule();
}

function switchUser(){
  currentEmployee=null;
  weekOffset=0;
  document.getElementById('select-screen').classList.remove('hide');
  document.getElementById('schedule-screen').classList.remove('show');
}

function changeWeek(dir){weekOffset+=dir;renderSchedule();}
function goToday(){weekOffset=0;renderSchedule();}

function renderSchedule(){
  const dates=getWeekDates(weekOffset);
  const today=localISO(new Date());
  const fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const dayNames=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  // Week nav title
  const weekStart=fmt(dates[0]),weekEnd=fmt(dates[dates.length-1]);
  document.getElementById('week-nav-title').textContent=weekOffset===0?'This Week':weekOffset===1?'Next Week':weekOffset===-1?'Last Week':weekStart+' — '+weekEnd;

  let html='';

  dates.forEach((date,i)=>{
    const ds=localISO(date);
    const isToday=ds===today;
    const isPast=ds<today&&!isToday;

    // Check assignments for this employee on this day
    const asgn=allData.assignments.find(a=>a.fields['Employee']===currentEmployee&&(a.fields['Date']||'').substring(0,10)===ds);

    // Check time off
    const toff=allData.timeoff.find(t=>t.fields['Employee']===currentEmployee&&(t.fields['Date']||'').substring(0,10)===ds);

    html+=`<div class="day-section">
      <div class="day-label ${isToday?'today-label':''}">
        ${dayNames[i]}, ${fmt(date)}
        ${isToday?'<span class="today-badge">TODAY</span>':''}
      </div>`;

    if(toff){
      // Time off
      html+=`<div class="off-card">
        <div class="off-icon">✈️</div>
        <div>
          <div class="off-text">${toff.fields['Reason']||'Time Off'}${toff.fields['Paid']?' (Paid)':' (Unpaid)'}</div>
          ${toff.fields['Notes']?`<div class="off-reason">${toff.fields['Notes']}</div>`:''}
        </div>
      </div>`;
    } else if(asgn){
      // Find job details
      const job=allData.jobs.find(j=>(j.fields['Customer Name']===asgn.fields['Job'])||(j.fields['Job Name']===asgn.fields['Job']));
      const color=job?(job.fields['Board Color']||TYPE_COLORS[job.fields['Job Type']]||'#888'):'#888';
      const typeColor=job?TYPE_COLORS[job.fields['Job Type']]||'#888':'#888';
      const address=job?(job.fields['Address']||''):'';
      const mapsUrl=address?`https://maps.google.com/?q=${encodeURIComponent(address)}`:'';

      html+=`<div class="job-card ${isToday?'today-card':''}">
        <div class="job-card-accent" style="background:${color}"></div>
        <div style="padding-left:8px">
          ${job?`<div class="job-type-pill" style="background:${typeColor}">${job.fields['Job Type']||'Job'}</div>`:''}
          <div class="job-name">${asgn.fields['Job']}</div>
          ${address?`<div class="job-address"><span class="job-address-icon">📍</span>${address}</div>`:''}
          ${job&&job.fields['Notes']?`<div class="job-notes">📋 ${job.fields['Notes']}</div>`:''}
          ${mapsUrl?`<a href="${mapsUrl}" target="_blank" class="map-btn">🗺️ Open in Maps</a>`:''}
        </div>
      </div>`;
    } else if(!isPast){
      // Not assigned yet
      html+=`<div class="unassigned-card">
        <span style="font-size:20px">📋</span>
        <div class="unassigned-text">Not scheduled yet — check back or contact the office.</div>
      </div>`;
    } else {
      // Past day with no assignment
      html+=`<div class="off-card" style="opacity:0.5">
        <div class="off-icon">—</div>
        <div class="off-text">No assignment</div>
      </div>`;
    }

    html+='</div>';
  });

  document.getElementById('schedule-body').innerHTML=html;
}

// Check URL params for direct employee link (from SMS)
function checkURLParams(){
  const params=new URLSearchParams(window.location.search);
  const name=params.get('emp');
  if(name){
    // Wait for data to load then auto-select
    const interval=setInterval(()=>{
      if(allData.employees.length>0){
        clearInterval(interval);
        const emp=allData.employees.find(e=>e.fields['Name'].toLowerCase()===name.toLowerCase());
        if(emp) selectEmployee(emp.fields['Name']);
      }
    },100);
  }
}

// Init
loadAll().then(checkURLParams);
</script>
</body>
</html>
